# Render Blueprint – so the Web Service builds from backend/ where requirements.txt lives
services:
  - type: web
    name: nse-scanner-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REFRESH_SECRET
        sync: false
