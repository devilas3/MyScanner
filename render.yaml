# Render Blueprint – so the Web Service builds from backend/ where requirements.txt lives
services:
  - type: web
    name: nse-scanner-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Resolve pooler hostname to IPv4 before app loads (avoids ip_address(hostname) errors on Render)
    startCommand: python -m app.run_resolved
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REFRESH_SECRET
        sync: false
